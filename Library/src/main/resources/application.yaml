spring:
  application:
    name: library

  datasource:
    url: jdbc:mysql://localhost:3306/reactlibrarydatabase
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    rest:
      base-path: /api

jwt:
  secret: mySecretKey123456789012345678901234567890
  access-token-expiration: 3600000  # 1 hour in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

stripe:
  key:
    secret: sk_test_***

server:
  port: 8080
